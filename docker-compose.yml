services:
  backend:
    build: ./backend
    container_name: countrealtime-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/app.db
      - ALLOWED_ORIGINS=https://count.aaisee.me,https://couting.aaisee.me,http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: countrealtime-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
